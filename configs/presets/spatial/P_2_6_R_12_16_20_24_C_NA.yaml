action_head:
  type: recurrent
  recurrent:
    prelude_vlm_layers: [2, 6]
    recurrent_vlm_layers: [12, 16, 20, 24]
    coda_vlm_layers: []
    mean_recurrence: 16
    backprop_depth: 8

optimizer:
  learning_rate: 0.00005

data:
  dataset_name: libero_spatial_no_noops

# Training
batch_size: 2
grad_accumulation_steps: 2
max_steps: 50000
save_freq: 5000