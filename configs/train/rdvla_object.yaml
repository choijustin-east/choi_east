action_head:
  type: recurrent
  recurrent:
    hidden_dim: 896
    num_heads: 8
    prelude_vlm_layers: [11]
    recurrent_vlm_layers: [23, 23]
    coda_vlm_layers: [23]
    action_chunk_len: 8
    action_dim: 7
    mean_recurrence: 32
    backprop_depth: 8
    random_iterations: true
    init_std: 0.632
    rms_norm_eps: 1e-6
    rope_base: 10000.0

data:
  data_root_dir: data/libero
  dataset_name: libero_object_no_noops
  image_aug: true

batch_size: 16
grad_accumulation_steps: 2
max_steps: 40000
save_freq: 5000
